name: Windows Rtools build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  windows-rtools-build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        r-version: [release]

    env:
      ITKR_RELEASE_ASSET: ITKR-${{ matrix.r-version }}.zip

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}

      - uses: r-lib/actions/setup-rtools@v2

      - name: Install CRAN dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("Rcpp", "RcppEigen"), repos = "https://cloud.r-project.org")

      - name: Install ITKR binary from release
        shell: pwsh
        run: |
          $asset = $env:ITKR_RELEASE_ASSET
          $url = "https://github.com/muschellij2/ITKR/releases/latest/download/$asset"
          Invoke-WebRequest -Uri $url -OutFile $asset
          R CMD INSTALL $asset

      - name: Build ANTsRCore
        shell: cmd
        run: |
          R CMD INSTALL .

      - name: Smoke test
        shell: Rscript {0}
        run: |
          library(ANTsRCore)
          cat("ANTsRCore loaded on Windows\n")
